name: moqi_challenge
description: "默契挑战 - 多人在线默契游戏"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.9.1

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.8.1

  # 本地存储
  shared_preferences: ^2.5.3

  # 音效
  audioplayers: ^6.4.0

  # 分享/海报
  screenshot: ^3.0.0
  share_plus: ^10.1.4

  # 工具
  uuid: ^4.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/images/
    - assets/data/
