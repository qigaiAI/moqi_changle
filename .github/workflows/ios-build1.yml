name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g. 1.0.1+2). Leave empty to use pubspec.yaml version.'
        required: false
        default: ''

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 建议使用稳定版本的 Flutter，例如 3.22.4 或 3.24.0
      # 原 3.35.5 可能不存在，这里改为 3.22.4（请根据项目实际要求修改）
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.4'   # 如需使用 3.35.5 请确认该版本存在
          channel: 'stable'
          cache: true

      - name: Print Flutter & Dart version
        run: |
          flutter --version
          dart --version

      - name: Override app version (optional)
        if: ${{ github.event.inputs.version != '' }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          sed -i '' "s/^version:.*/version: ${VERSION}/" pubspec.yaml
          echo "Version set to: ${VERSION}"
          grep '^version:' pubspec.yaml

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run code generation (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      # 关键修正：生成未签名的 .app，再手动打包为 .ipa
      - name: Build unsigned .app bundle
        run: flutter build ios --release --no-codesign

      - name: Package as unsigned IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -qr Runner.ipa Payload
          cd -
          echo "Unsigned IPA created at build/ios/ipa/Runner.ipa"

      - name: Locate IPA file
        id: find_ipa
        run: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No .ipa found — listing build/ios/ for debug:"
            find build/ios -maxdepth 3 -type f
            exit 1
          fi
          echo "ipa_path=${IPA_PATH}" >> "$GITHUB_OUTPUT"
          echo "Found IPA: ${IPA_PATH}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: moqi_challenge-ios-unsigned-${{ github.run_number }}
          path: ${{ steps.find_ipa.outputs.ipa_path }}
          retention-days: 30
          if-no-files-found: error